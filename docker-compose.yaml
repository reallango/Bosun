version: "3.8"


services:
  bosun:
    build: .
    image: bosun:latest
    container_name: bosun
    restart: unless-stopped
    environment:
      - NODE_NAME=server-a
      - RQLITE_JOIN=
      - COOKIE_SECURE=${COOKIE_SECURE:-"false"}
      - MASTER_KEY=${MASTER_KEY}
      - AUTH_SECRET=${AUTH_SECRET}
      - WS_PORT=3002
      - APP_URL=${APP_URL:-http://localhost:3042}
    volumes:
      - bosun-data:/data/rqlite
    ports:
      - "3042:3042"
    networks:
      - bosun-net
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s


volumes:
  bosun-data:
    driver: local


networks:
  bosun-net:
    driver: bridge
